<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>
    :root {
      --bg: #0f0f1a;
      --sclera: #f5f5f0;
      --iris-color: rgb(74,144,226);
      --pupil-color: #000000;
      --iris-size: 55;           /* @ws number min=20 max=80 step=1 */
      --pupil-size: 18;          /* @ws number min=5 max=40 step=1 */
      --look-x: 100;             /* @ws point2d=look */
      --look-y: 100;             /* @ws point2d=look */
      --glow: true;
      --caption: eye;
    }
  </style>
  <rect width="100%" height="100%" fill="var(--bg)" />
  <circle cx="100" cy="100" r="80" fill="var(--sclera)" />
  <circle cx="var(--look-x)" cy="var(--look-y)" r="var(--iris-size)" fill="var(--iris-color)" />
  <circle cx="var(--look-x)" cy="var(--look-y)" r="var(--pupil-size)" fill="var(--pupil-color)" />
  <circle cx="var(--look-x)" cy="var(--look-y)" r="4" fill="white" opacity="0.8"
          transform="translate(-6,-6)" />
</svg>
