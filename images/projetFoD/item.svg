  <line x1="120" y1="180" x2="280" y2="180" stroke="#7c3aed" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="200" y1="80" x2="120" y2="180" stroke="#7c3aed" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="200" y1="80" x2="280" y2="180" stroke="#7c3aed" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Glow -->
  <circle cx="200" cy="190" r="20" fill="#7c3aed" opacity="0.08"/>
