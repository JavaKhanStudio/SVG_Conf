<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="12" fill="#1c1917"/>
  <rect x="1" y="1" width="398" height="398" rx="11" stroke="#6b21a8" stroke-opacity="0.3" stroke-width="2"/>
  <!-- Gem shape -->
  <polygon points="200,80 280,180 240,300 160,300 120,180" fill="#292524" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="2"/>
  <!-- Inner facets -->
