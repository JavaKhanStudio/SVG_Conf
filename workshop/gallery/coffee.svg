<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720"><style>:root {
      --wall-color: #b6cad9;        /* blue painted wall */
      --ceiling-color: #d2dde6;     /* lighter top wall band */
      --tile-color: #e3dfd1;        /* off-white wall tiles */
      --tile-grout: #b1a99a;
      --pipe-color: #c1d2df;        /* horizontal wall pipe */
      --toaster-color: #1e1919;     /* toaster oven black body (sampled) */
      --toaster-vent: #1d1918;      /* sampled */
      --kettle-color: #252224;      /* black kettle on left (sampled) */
      --carafe-glass: #695549;      /* glass carafe with coffee residue (sampled) */
      --carafe-lid: #131010;        /* black lid (sampled) */
      --carafe-tint: 0.85;          /* @ws number min=0.2 max=1 step=0.05 */
      --carafe-rim: #0e0e10;
      --coffee-residue: #785b4a;    /* brown stain at bottom of carafe (sampled) */
      --tefal-silver: #b6b6be;      /* Tefal water reservoir metal */
      --tefal-shadow: #6e6e76;
      --tefal-cap: #1a1a1d;         /* black cap on top */
      --button-color: #f4f0e8;      /* white control plate */
      --button-icon: #1a1a1d;
      --warning-color: #d9a82a;     /* yellow warning triangle */
      --camera-color: #f0eee7;
      --outline: #050507;
      --stroke-thin: 1;             /* @ws number min=0.3 max=3 step=0.2 */
      --stroke-mid: 2;              /* @ws number min=0.5 max=4 step=0.5 */
    }
    .wall          { fill: var(--wall-color); }
    .ceiling       { fill: var(--ceiling-color); }
    .tile          { fill: var(--tile-color); stroke: var(--tile-grout); stroke-width: var(--stroke-thin); }
    .pipe          { fill: var(--pipe-color); stroke: var(--outline); stroke-width: var(--stroke-thin); }
    .toaster       { fill: var(--toaster-color); stroke: var(--outline); stroke-width: var(--stroke-mid); stroke-linejoin: round; }
    .vent          { fill: var(--toaster-vent); }
    .kettle        { fill: var(--kettle-color); stroke: var(--outline); stroke-width: var(--stroke-mid); stroke-linejoin: round; }
    .carafe        { fill: var(--carafe-glass); stroke: var(--carafe-rim); stroke-width: var(--stroke-mid); stroke-linejoin: round; opacity: var(--carafe-tint); }
    .carafe-lid    { fill: var(--carafe-lid); stroke: var(--carafe-rim); stroke-width: var(--stroke-thin); }
    .coffee        { fill: var(--coffee-residue); }
    .tefal         { fill: var(--tefal-silver); stroke: var(--outline); stroke-width: var(--stroke-mid); stroke-linejoin: round; }
    .tefal-shade   { fill: var(--tefal-shadow); }
    .cap           { fill: var(--tefal-cap); stroke: var(--outline); stroke-width: var(--stroke-thin); stroke-linejoin: round; }
    .button        { fill: var(--button-color); stroke: var(--outline); stroke-width: var(--stroke-thin); }
    .warning       { fill: var(--warning-color); stroke: var(--outline); stroke-width: var(--stroke-thin); stroke-linejoin: round; }
    .camera        { fill: var(--camera-color); stroke: var(--outline); stroke-width: var(--stroke-thin); }
    .label         { font-family: sans-serif; fill: var(--outline); }#trace-ref path { fill: none !important; stroke: #ff00ff; stroke-width: 0.5; vector-effect: non-scaling-stroke; opacity: 0.85; }</style><path d="M0 0h1280v720H0z" class="wall"/><path d="M0 0h1280v220l-410-20-520-70-80-70z" class="ceiling"/><path d="M0 225h1280v22H0z" class="pipe"/><g class="tiles"><path d="M855 245h120v95H855zm120 0h120v95H975zm120 0h120v95h-120zm120 0h120v95h-120zm-360 95h120v95H855zm120 0h120v95H975zm120 0h120v95h-120zm120 0h120v95h-120zm-360 95h120v95H855zm120 0h120v95H975zm120 0h120v95h-120zm120 0h120v95h-120z" class="tile"/></g><path d="M285 320q0-15 20-15h165q20 0 20 15v220q0 15-20 15H305q-20 0-20-15Z" class="kettle"/><path d="M270 530v190h820V540q-5-15-20-15H290q-20 0-20 15Z" class="toaster"/><rect width="495" height="140" x="305" y="565" class="vent" rx="6"/><rect width="180" height="100" x="820" y="600" class="vent" rx="4"/><circle cx="1010" cy="660" r="22" class="button"/><circle cx="1010" cy="660" r="6" class="vent"/><path d="m600 640 25 45h-50z" class="warning"/><path d="M360 525V360q0-40 40-45l140-7v-3h260q15 0 15 15v205Z" class="toaster"/><path d="M540 330v175h260V330Z" class="vent"/><rect width="225" height="32" x="555" y="335" class="carafe-lid" rx="3"/><ellipse cx="660" cy="445" class="carafe" rx="92" ry="62"/><ellipse cx="660" cy="482" class="coffee" opacity=".8" rx="80" ry="14"/><path fill="none" d="M750 415q40 5 40 35 0 28-40 32" class="carafe"/><rect width="170" height="32" x="600" y="508" class="button" rx="6"/><circle cx="628" cy="524" r="7" fill="var(--button-icon)" opacity=".5"/><circle cx="668" cy="524" r="7" fill="var(--button-icon)" opacity=".5"/><text x="710" y="528" class="label" font-size="11" opacity=".6">KRUPS</text><path d="M580 320V175q0-30 35-35h160q35 5 35 35v145Z" class="tefal"/><path d="M590 152q0-37 25-37h160q25 0 25 37Z" class="cap"/><path d="M600 165h42l-4 155h-42Z" class="tefal-shade" opacity=".6"/><path d="M760 165h40v155h-45Z" class="tefal-shade" opacity=".4"/><text x="700" y="245" class="label" font-size="22" font-weight="bold" opacity=".7" text-anchor="middle">Tefal</text><rect width="22" height="65" x="1124" y="540" class="camera" rx="3"/><circle cx="1136" cy="630" r="38" class="camera"/><circle cx="1136" cy="630" r="24" class="vent"/><circle cx="1136" cy="630" r="13" class="camera" opacity=".8"/><text x="1162" y="565" class="label" font-size="14" opacity=".7">now</text></svg>